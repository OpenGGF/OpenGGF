name: Release

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch policy
        run: bash .githooks/validate-policy.sh ci-pr "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" "${{ github.base_ref }}" "${{ github.head_ref }}"

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -B

      - name: Run trace replay policy tests
        run: mvn test -Ptrace-replay -B

      - name: Assert trace replay coverage
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          reports = sorted(Path("target/surefire-reports").glob("com.openggf.tests.trace*.txt"))
          total = 0
          skipped = 0
          for report in reports:
              text = report.read_text(encoding="utf-8", errors="replace")
              match = re.search(r"Tests run: (\d+), Failures: \d+, Errors: \d+, Skipped: (\d+)", text)
              if match:
                  total += int(match.group(1))
                  skipped += int(match.group(2))

          executed = total - skipped
          if executed == 0:
              print("Trace replay profile produced no executed ROM-backed trace tests", file=sys.stderr)
              print(f"trace_reports={len(reports)} total={total} skipped={skipped}", file=sys.stderr)
              sys.exit(1)

          warning_reports = []
          for report in sorted(Path("target/trace-reports").glob("*_report.json")):
              data = json.loads(report.read_text(encoding="utf-8"))
              warning_count = int(data.get("warning_count", 0))
              if warning_count > 0:
                  warning_reports.append((report, warning_count))

          if warning_reports:
              print("Trace replay warnings are release-blocking; warning-only fields do not certify parity",
                    file=sys.stderr)
              for report, warning_count in warning_reports:
                  print(f"{report}: warning_count={warning_count}", file=sys.stderr)
              sys.exit(1)

          print(f"Trace replay coverage: executed={executed} total={total} skipped={skipped}")
          PY

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          cache: maven

      - name: Build native image
        run: mvn package -Pnative -DskipTests -B

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/OpenGGF
          Copy-Item "target/OpenGGF.exe" "dist/OpenGGF/"
          Copy-Item "target/native-libs/*.dll" "dist/OpenGGF/"
          Compress-Archive -Path "dist/OpenGGF" -DestinationPath "dist/OpenGGF-windows.zip"
          Remove-Item -Recurse -Force "dist/OpenGGF"

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        run: |
          mkdir -p dist
          bash src/packaging/assemble-macos-app.sh target/OpenGGF dist
          cd dist
          zip -r OpenGGF-macos.zip OpenGGF.app
          rm -rf OpenGGF.app

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p dist/OpenGGF
          cp target/OpenGGF dist/OpenGGF/
          cp target/native-libs/*.so dist/OpenGGF/
          tar -czvf dist/OpenGGF-linux.tar.gz -C dist OpenGGF
          rm -rf dist/OpenGGF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openggf-${{ matrix.platform }}
          path: dist/*
          retention-days: 30

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
