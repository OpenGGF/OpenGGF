name: Release

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch policy
        run: bash .githooks/validate-policy.sh ci-pr "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" "${{ github.base_ref }}" "${{ github.head_ref }}"

  test:
    runs-on: [self-hosted, release-fixtures]
    env:
      SONIC1_ROM_PATH: ${{ vars.SONIC1_ROM_PATH }}
      SONIC2_ROM_PATH: ${{ vars.SONIC2_ROM_PATH }}
      S3K_ROM_PATH: ${{ vars.S3K_ROM_PATH }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify trace replay ROM paths
        shell: bash
        run: |
          missing=0
          for var in SONIC1_ROM_PATH SONIC2_ROM_PATH S3K_ROM_PATH; do
            value="${!var:-}"
            if [ -z "$value" ]; then
              echo "::error ::$var must point to a release-validation ROM fixture."
              missing=1
            elif [ ! -f "$value" ]; then
              echo "::error ::$var points to '$value', but that file does not exist."
              missing=1
            fi
          done
          exit "$missing"

      - name: Run tests
        shell: bash
        run: |
          mvn -Dmse=off test -B \
            -Dsonic1.rom.path="${SONIC1_ROM_PATH}" \
            -Dsonic2.rom.path="${SONIC2_ROM_PATH}" \
            -Ds3k.rom.path="${S3K_ROM_PATH}"

      - name: Run trace replay policy tests
        shell: bash
        run: |
          mvn -Dmse=off test -Ptrace-replay -B \
            -Dsonic1.rom.path="${SONIC1_ROM_PATH}" \
            -Dsonic2.rom.path="${SONIC2_ROM_PATH}" \
            -Ds3k.rom.path="${S3K_ROM_PATH}"

      - name: Assert trace replay coverage
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import re
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          surefire_dir = Path("target/surefire-reports")
          required_rom_backed_trace_reports = {
              "TEST-com.openggf.tests.trace.s1.TestS1Ghz1TraceReplay.xml": "s1-ghz1",
              "TEST-com.openggf.tests.trace.s1.TestS1Mz1TraceReplay.xml": "s1-mz1",
              "TEST-com.openggf.tests.trace.s2.TestS2Ehz1TraceReplay.xml": "s2-ehz1",
              "TEST-com.openggf.tests.trace.s3k.TestS3kCnzTraceReplay.xml": "s3k-cnz",
          }
          required_executed = 0
          for report_name, label in sorted(required_rom_backed_trace_reports.items()):
              report = surefire_dir / report_name
              if not report.exists():
                  print(f"Missing required ROM-backed trace report: {report} ({label})", file=sys.stderr)
                  sys.exit(1)
              root = ET.parse(report).getroot()
              tests = int(root.attrib.get("tests", "0"))
              skipped_count = int(root.attrib.get("skipped", "0"))
              executed_count = tests - skipped_count
              if executed_count <= 0:
                  print(
                      f"Required ROM-backed trace report did not execute: {report} "
                      f"({label}) tests={tests} skipped={skipped_count}",
                      file=sys.stderr)
                  sys.exit(1)
              required_executed += executed_count

          reports = sorted(surefire_dir.glob("com.openggf.tests.trace*TraceReplay.txt"))
          total = 0
          skipped = 0
          skipped_reports = []
          for report in reports:
              text = report.read_text(encoding="utf-8", errors="replace")
              match = re.search(r"Tests run: (\d+), Failures: \d+, Errors: \d+, Skipped: (\d+)", text)
              if match:
                  run_count = int(match.group(1))
                  skipped_count = int(match.group(2))
                  total += run_count
                  skipped += skipped_count
                  if skipped_count > 0:
                      skipped_reports.append((report, skipped_count))

          executed = total - skipped
          if executed == 0:
              print("Trace replay profile produced no executed ROM-backed trace tests", file=sys.stderr)
              print(f"trace_reports={len(reports)} total={total} skipped={skipped}", file=sys.stderr)
              sys.exit(1)

          allowed_skipped_reports = {
              "com.openggf.tests.trace.s3k.TestS3kAizTraceReplay.txt",
          }
          unexpected_skipped = [
              (report, skipped_count)
              for report, skipped_count in skipped_reports
              if report.name not in allowed_skipped_reports
          ]
          if unexpected_skipped:
              print("Trace replay skipped tests are release-blocking unless explicitly allowlisted as diagnostic-only debt",
                    file=sys.stderr)
              for report, skipped_count in unexpected_skipped:
                  print(f"{report}: skipped={skipped_count}", file=sys.stderr)
              sys.exit(1)

          warning_reports = []
          for report in sorted(Path("target/trace-reports").glob("*_report.json")):
              data = json.loads(report.read_text(encoding="utf-8"))
              warning_count = int(data.get("warning_count", 0))
              if warning_count > 0:
                  warning_reports.append((report, warning_count))

          if warning_reports:
              print("Trace replay warnings are release-blocking; warning-only fields do not certify parity",
                    file=sys.stderr)
              for report, warning_count in warning_reports:
                  print(f"{report}: warning_count={warning_count}", file=sys.stderr)
              sys.exit(1)

          print(
              f"Trace replay coverage: executed={executed} total={total} skipped={skipped} "
              f"required_rom_backed_executed={required_executed} "
              f"required_rom_backed_reports={len(required_rom_backed_trace_reports)}")
          PY

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          cache: maven

      - name: Build native image
        run: mvn -Dmse=off package -Pnative -DskipTests -B

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/OpenGGF
          Copy-Item "target/OpenGGF.exe" "dist/OpenGGF/"
          Copy-Item "target/config.yaml" "dist/OpenGGF/"
          Copy-Item "target/native-libs/*.dll" "dist/OpenGGF/"
          Compress-Archive -Path "dist/OpenGGF" -DestinationPath "dist/OpenGGF-windows.zip"
          Remove-Item -Recurse -Force "dist/OpenGGF"

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        run: |
          mkdir -p dist
          bash src/packaging/assemble-macos-app.sh target/OpenGGF dist
          cd dist
          zip -r OpenGGF-macos.zip OpenGGF.app config.yaml
          rm -rf OpenGGF.app

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p dist/OpenGGF
          cp target/OpenGGF dist/OpenGGF/
          cp target/config.yaml dist/OpenGGF/
          cp target/native-libs/*.so dist/OpenGGF/
          tar -czvf dist/OpenGGF-linux.tar.gz -C dist OpenGGF
          rm -rf dist/OpenGGF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openggf-${{ matrix.platform }}
          path: dist/*
          retention-days: 30

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from pom.xml
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
